<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#010c04">
  <title>Mapas Tlalpan</title>
  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
    html,body { min-height:100%; font-family:Arial,Helvetica,sans-serif; background:#010c04; overflow-x:hidden; }
    #bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
    .container {
      position:relative; z-index:1;
      display:-webkit-box; display:-ms-flexbox; display:flex;
      -webkit-box-orient:vertical; -webkit-box-direction:normal;
      -ms-flex-direction:column; flex-direction:column;
      -webkit-box-align:center; -ms-flex-align:center; align-items:center;
      -webkit-box-pack:center; -ms-flex-pack:center; justify-content:center;
      padding:30px 16px 50px; min-height:100vh;
    }
    h1 {
      color:#fff; font-size:1.5rem; font-weight:bold; text-align:center;
      text-shadow:0 0 20px rgba(50,200,80,0.85), 0 2px 4px rgba(0,0,0,0.9);
      margin-bottom:36px; padding:14px 20px;
      background:rgba(0,0,0,0.5); border-radius:12px;
      border:1px solid rgba(50,200,80,0.4);
    }
    .btn {
      display:block; width:100%; max-width:340px;
      text-align:center; padding:18px 16px; border-radius:12px;
      text-decoration:none; font-weight:bold; font-size:1rem; color:#fff;
      margin-bottom:14px; -webkit-tap-highlight-color:transparent;
      -webkit-transition:opacity 0.15s; transition:opacity 0.15s;
    }
    .btn:active { opacity:0.75; }
    .btn-epica {
      background:rgba(10,80,25,0.88);
      border:1.5px solid rgba(50,200,80,0.95);
      text-shadow:0 0 10px rgba(50,200,80,0.7);
    }
    .btn-temporal {
      background:rgba(15,100,40,0.88);
      border:1.5px solid rgba(37,180,80,0.95);
      text-shadow:0 0 10px rgba(37,180,80,0.65);
    }
    .btn-back {
      background:rgba(5,25,10,0.85);
      border:1.5px solid rgba(50,150,70,0.65);
      font-size:0.9rem; margin-top:8px;
    }
    .conejo {
      display:block; width:180px; height:auto;
      margin-top:22px;
      border-radius:18px;
      box-shadow:0 8px 28px rgba(0,0,0,0.75), 0 0 0 2px rgba(50,180,70,0.4);
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="container">
    <h1>Mapas Tlalpan</h1>

    <!-- LINK: Mapa seguimiento EPICAS — Tlalpan -->
    <a href="https://www.google.com/maps/d/edit?mid=1xCrW7KQkPdOyBuRmbaNFtKe6n4w6I5A&usp=sharing"
       class="btn btn-epica" target="_blank" rel="noopener noreferrer">
      Mapa seguimiento EPICAS
    </a>

    <!-- LINK: Mapa de iniciativa temporal — Tlalpan -->
    <a href="https://www.google.com/maps/d/edit?mid=1HQQsj0Voc9YUPoIgtRbIeffoVCPkuiw&usp=sharing"
       class="btn btn-temporal" target="_blank" rel="noopener noreferrer">
      Mapa de iniciativa temporal
    </a>

    <!-- LINK: Regresa a la página principal -->
    <a href="inicio.html" class="btn btn-back">← Regresar</a>

    <img src="Imagenes/conejo.png" alt="Brigadista" class="conejo">
  </div>

  <script>
    (function () {
      var canvas = document.getElementById('bg');
      var gl = null;
      try { gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl'); } catch (e) {}
      if (!gl) { canvas.style.display = 'none'; return; }

      var VS = 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
      var FS = [
        'precision mediump float;',
        'uniform float u_t;',
        'uniform vec2  u_r;',
        'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
        'void main(){',
        '  float sz=max(floor(min(u_r.x,u_r.y)/20.),10.);',
        '  vec2 cC=floor(gl_FragCoord.xy/sz);',
        '  vec2 loc=fract(gl_FragCoord.xy/sz);',
        '  float gap=0.11;',
        '  float inC=step(gap,loc.x)*step(gap,loc.y)*step(loc.x,1.-gap)*step(loc.y,1.-gap);',
        '  float h=hash(cC); float h2=hash(cC+vec2(37.3,58.1));',
        '  float alive=step(0.05,sin(u_t*(0.3+h2*2.)*0.5+h*6.2832));',
        '  float bright=(0.3+h*0.7)*alive;',
        '  vec3 cA=mix(vec3(0.15,0.60,0.25),vec3(0.05,0.40,0.15),h);',
        '  vec3 cD=vec3(0.01,0.07,0.02);',
        '  vec3 col=mix(cD,cA*bright,inC*alive)+cD*0.4*(1.-inC);',
        '  vec2 uv=gl_FragCoord.xy/u_r*2.-1.;',
        '  col*=pow(1.-clamp(length(uv)*0.78,0.,1.),1.7);',
        '  gl_FragColor=vec4(col,1.);',
        '}'
      ].join('\n');

      function sh(t,s){var x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}
      var p=gl.createProgram();
      gl.attachShader(p,sh(gl.VERTEX_SHADER,VS));
      gl.attachShader(p,sh(gl.FRAGMENT_SHADER,FS));
      gl.linkProgram(p);gl.useProgram(p);
      var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
      gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
      var a=gl.getAttribLocation(p,'a');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
      var uT=gl.getUniformLocation(p,'u_t'),uR=gl.getUniformLocation(p,'u_r');
      function resize(){var dpr=Math.min(window.devicePixelRatio||1,1.5);var w=Math.min(Math.floor(window.innerWidth*dpr),1080);var h=Math.min(Math.floor(window.innerHeight*dpr),1920);canvas.width=w;canvas.height=h;gl.viewport(0,0,w,h);gl.uniform2f(uR,w,h);}
      resize();window.addEventListener('resize',resize);
      var last=0,fps=1000/30;
      function draw(ts){if(ts-last>=fps){last=ts;gl.uniform1f(uT,ts*0.001);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}requestAnimationFrame(draw);}
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>

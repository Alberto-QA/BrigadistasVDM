<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3a2000">
  <title>Iniciativas Temporales</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      background: #1a0d00;
    }

    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -ms-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      padding: 18px 14px 40px;
      min-height: 100vh;
    }

    .titulo {
      text-align: center;
      color: #fff;
      font-size: 1.05rem;
      font-weight: bold;
      line-height: 1.5;
      text-shadow: 0 0 18px rgba(255, 200, 0, 0.9), 0 2px 4px rgba(0,0,0,0.9);
      margin-bottom: 18px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
      border: 1px solid rgba(255, 200, 0, 0.5);
      width: 100%;
      max-width: 380px;
    }

    .btn-full {
      display: block;
      width: 100%;
      max-width: 380px;
      text-align: center;
      padding: 17px 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 12px;
      -webkit-tap-highlight-color: transparent;
      -webkit-transition: background 0.15s;
      transition: background 0.15s;
    }

    .btn-yellow {
      background: rgba(120, 80, 0, 0.55);
      border: 1.5px solid rgba(255, 200, 0, 0.85);
      text-shadow: 0 0 10px rgba(255, 200, 0, 0.7);
    }

    .btn-yellow:active {
      background: rgba(180, 130, 0, 0.6);
    }

    .btn-back {
      background: rgba(40, 40, 40, 0.5);
      border: 1.5px solid rgba(180, 180, 180, 0.6);
      text-shadow: none;
      color: #ccc;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .btn-back:active {
      background: rgba(80, 80, 80, 0.5);
    }

    .img-banner {
      width: 100%;
      max-width: 380px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 1.5px solid rgba(255, 200, 0, 0.5);
      margin-bottom: 18px;
      display: block;
    }

    .gradient-bg {
      background: linear-gradient(135deg, #1a0d00, #7a4e00, #b87800, #ffa500, #7a4e00, #1a0d00);
      background-size: 400% 400%;
      -webkit-animation: gradShift 10s ease infinite;
      animation: gradShift 10s ease infinite;
    }

    @-webkit-keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="container">

    <div class="titulo">
      🚨 Iniciativas Temporales
    </div>

    <img src="Imagenes/xp.jpg" alt="XP" class="img-banner">

    <a href="https://forms.office.com/r/AXUpP53cWg"
       class="btn-full btn-yellow" target="_blank" rel="noopener noreferrer">
      Encuesta XP
    </a>

    <a href="inicio.html" class="btn-full btn-back">
      ← Regresar
    </a>

  </div>

  <script>
    (function () {
      var canvas = document.getElementById('bg');
      var gl = null;

      try {
        gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      } catch (e) {}

      if (!gl) {
        canvas.style.display = 'none';
        document.body.classList.add('gradient-bg');
        return;
      }

      var VS = [
        'attribute vec2 a_pos;',
        'void main(){gl_Position=vec4(a_pos,0.0,1.0);}'
      ].join('\n');

      var FS = [
        'precision mediump float;',
        'uniform float u_t;',
        'uniform vec2 u_r;',

        'vec2 fw(vec2 p, float s, float t) {',
        '  float inv = 0.3 / s;',
        '  return p + vec2(',
        '    (sin(p.y*s + t + 1.30) + sin(p.x*s*0.6 + t*0.70)) * inv,',
        '    (sin(p.x*s - t*0.90 + 2.10) + sin(p.y*s*0.6 - t*0.60)) * inv',
        '  );',
        '}',

        'void main(){',
        '  vec2 uv = gl_FragCoord.xy / u_r * 2.0 - 1.0;',
        '  uv.x *= u_r.x / u_r.y;',

        '  float t = u_t * 0.14;',
        '  vec2 p = uv;',

        '  p = fw(p, 1.2, t);',
        '  p = fw(p, 2.0, t);',
        '  p = fw(p, 3.5, t);',
        '  p = fw(p, 5.5, t);',
        '  p = fw(p, 8.0, t);',

        '  float cx = abs(sin(p.x * 2.8));',
        '  float cy = abs(sin(p.y * 2.8));',
        '  float raw = cx * cy;',
        '  float ii  = pow(raw, 0.42);',

        /* Color palette: dark amber → gold → bright yellow */
        '  vec3 void_  = vec3(0.06, 0.03, 0.00);',
        '  vec3 amber  = vec3(0.60, 0.35, 0.02);',
        '  vec3 gold   = vec3(0.92, 0.72, 0.05);',
        '  vec3 bright = vec3(1.00, 0.97, 0.75);',

        '  vec3 col = mix(void_,  amber,  ii * 0.85);',
        '  col      = mix(col,    gold,   pow(ii, 1.8) * 1.3);',
        '  col      = mix(col,    bright, pow(ii, 5.0) * 0.55);',

        '  float dist = length(uv);',
        '  float vig  = 1.0 - clamp(dist * 0.82, 0.0, 1.0);',
        '  vig = pow(vig, 1.9);',
        '  col *= vig;',

        '  gl_FragColor = vec4(col, 1.0);',
        '}'
      ].join('\n');

      function mkShader(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }

      var prog = gl.createProgram();
      gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      var buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER,
        new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
        gl.STATIC_DRAW);

      var aPos = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      var uT = gl.getUniformLocation(prog, 'u_t');
      var uR = gl.getUniformLocation(prog, 'u_r');

      function resize() {
        var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        var w = Math.min(Math.floor(window.innerWidth  * dpr), 1080);
        var h = Math.min(Math.floor(window.innerHeight * dpr), 1920);
        canvas.width  = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
        gl.uniform2f(uR, w, h);
      }

      resize();
      window.addEventListener('resize', resize);

      var lastTs  = 0;
      var FRAME_MS = 1000 / 30;

      function draw(ts) {
        if (ts - lastTs >= FRAME_MS) {
          lastTs = ts;
          gl.uniform1f(uT, ts * 0.001);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    })();
  </script>

</body>
</html>

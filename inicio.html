  <script>
    (function () {
      var canvas = document.getElementById('bg');
      var gl = null;

      try {
        gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      } catch (e) {}

      if (!gl) {
        // No WebGL — apply CSS gradient fallback on body
        canvas.style.display = 'none';
        document.body.classList.add('gradient-bg');
        return;
      }

      /* ---------- Shaders ---------- */
      var VS = [
        'attribute vec2 a_pos;',
        'void main(){gl_Position=vec4(a_pos,0.0,1.0);}'
      ].join('\n');

      /*
       * Abismo violeta/rosa — cáusticas con domain warping en 5 capas.
       * Técnica: cada capa desplaza las UV usando senos a frecuencias
       * crecientes (1.2 → 8.0) con amplitud decreciente. El resultado
       * final pasa por abs(sin(x))*abs(sin(y)) para crear manchas
       * brillantes orgánicas como luz filtrándose bajo el agua.
       */
      var FS = [
        'precision mediump float;',
        'uniform float u_t;',
        'uniform vec2 u_r;',

        /* One domain-warp stage: displaces p using sine at scale s */
        'vec2 fw(vec2 p, float s, float t) {',
        '  float inv = 0.3 / s;',
        '  return p + vec2(',
        '    (sin(p.y*s + t + 1.30) + sin(p.x*s*0.6 + t*0.70)) * inv,',
        '    (sin(p.x*s - t*0.90 + 2.10) + sin(p.y*s*0.6 - t*0.60)) * inv',
        '  );',
        '}',

        'void main(){',
        '  vec2 uv = gl_FragCoord.xy / u_r * 2.0 - 1.0;',
        '  uv.x *= u_r.x / u_r.y;',

        /* Slow time — dreamy movement like Abismo */
        '  float t = u_t * 0.14;',
        '  vec2 p = uv;',

        /* 5 warp layers — progressively finer detail */
        '  p = fw(p, 1.2, t);',
        '  p = fw(p, 2.0, t);',
        '  p = fw(p, 3.5, t);',
        '  p = fw(p, 5.5, t);',
        '  p = fw(p, 8.0, t);',

        /* Caustic intensity: bright ridges where both axes peak */
        '  float cx = abs(sin(p.x * 2.8));',
        '  float cy = abs(sin(p.y * 2.8));',
        '  float raw = cx * cy;',
        '  float ii  = pow(raw, 0.42);',   /* soften, expand bright areas */

        /* Color palette: void → violet → pink → bright highlight */
        '  vec3 void_  = vec3(0.03, 0.01, 0.09);',
        '  vec3 violet = vec3(0.40, 0.16, 0.75);',
        '  vec3 pink   = vec3(0.86, 0.20, 0.55);',
        '  vec3 bright = vec3(0.95, 0.78, 1.00);',

        '  vec3 col = mix(void_,  violet, ii * 0.85);',
        '  col      = mix(col,    pink,   pow(ii, 1.8) * 1.3);',
        '  col      = mix(col,    bright, pow(ii, 5.0) * 0.55);',

        /* Deep Abismo vignette — edges go black */
        '  float dist = length(uv);',
        '  float vig  = 1.0 - clamp(dist * 0.82, 0.0, 1.0);',
        '  vig = pow(vig, 1.9);',
        '  col *= vig;',

        '  gl_FragColor = vec4(col, 1.0);',
        '}'
      ].join('\n');

      function mkShader(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }

      var prog = gl.createProgram();
      gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      var buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER,
        new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
        gl.STATIC_DRAW);

      var aPos = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      var uT = gl.getUniformLocation(prog, 'u_t');
      var uR = gl.getUniformLocation(prog, 'u_r');

      /* Render at reduced pixel density — saves GPU on old devices */
      function resize() {
        var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        /* Also cap resolution to avoid huge canvases on tablets */
        var w = Math.min(Math.floor(window.innerWidth  * dpr), 1080);
        var h = Math.min(Math.floor(window.innerHeight * dpr), 1920);
        canvas.width  = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
        gl.uniform2f(uR, w, h);
      }

      resize();
      window.addEventListener('resize', resize);

      /* Cap at 30 fps — smooth but gentle on old phones */
      var lastTs  = 0;
      var FRAME_MS = 1000 / 30;

      function draw(ts) {
        if (ts - lastTs >= FRAME_MS) {
          lastTs = ts;
          gl.uniform1f(uT, ts * 0.001);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    })();
  </script>
